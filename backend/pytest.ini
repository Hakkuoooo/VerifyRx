[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers
markers =
    slow: tests that load a large ML model (DistilBERT, ResNet). Skippable on CI budgets.
    smoke: API-level smoke tests that exercise the FastAPI TestClient stack.
filterwarnings =
    ignore::DeprecationWarning:transformers.*
    ignore::UserWarning:torch.*
    ignore::FutureWarning
